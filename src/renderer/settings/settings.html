<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>設定</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .description {
      margin: 0 0 16px;
      color: #555;
      font-size: 13px;
      line-height: 1.4;
    }
    .table-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid #d1d1d1;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 12px;
      overflow: hidden;
    }

    /* ヘッダは5列 */
    .table-header {
      display: grid;
      grid-template-columns: 60px minmax(180px, 1fr) 140px 104px 64px;
      gap: 12px;
      padding: 12px 16px;
      background: #f0f0f0;
      border-bottom: 1px solid #d1d1d1;
      font-weight: 600;
      font-size: 13px;
      align-items: center;
    }

    .table-body {
      flex: 1;
      overflow-y: auto;
    }

    /* 各デバイスは2段構成 */
    .table-row {
      padding: 10px 16px 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .table-row:last-child {
      border-bottom: none;
    }
    .table-row.missing {
      background: #fafafa;
      opacity: 0.75;
    }

    /* 上段: デバイス名 */
    .device-name-row {
      margin-bottom: 8px;
    }
    .device-name {
      word-break: break-word;
      font-size: 14px;
      font-weight: 600;
    }
    .device-name.unavailable {
      color: #999;
      font-size: 14px;
      font-weight: 400;
    }

    /* 下段: ヘッダと同じ5列 */
    .device-fields-row {
      display: grid;
      grid-template-columns: 60px minmax(180px, 1fr) 140px 104px 64px;
      gap: 12px;
      align-items: center;
    }

    .checkbox-col {
      display: flex;
      justify-content: center;
    }
    .checkbox-col input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .alias-col {
      display: flex;
    }
    .alias-col input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .hotkey-col {
      display: flex;
    }
    .hotkey-col select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .shortcut-col {
      display: flex;
      justify-content: center;
    }
    .shortcut-drag {
      width: 100%;
      padding: 6px 10px;
      border: 1px dashed #7aa7d9;
      border-radius: 6px;
      background: #eef6ff;
      color: #1f5da8;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      cursor: grab;
      user-select: none;
    }
    .shortcut-drag:active {
      cursor: grabbing;
    }
    .icon-color-col {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .icon-color-swatch {
      width: 22px;
      height: 22px;
      border: 1px solid #999;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      padding: 0;
      position: relative;
    }
    .icon-color-swatch.is-empty::after {
      content: '';
      position: absolute;
      left: 3px;
      right: 3px;
      top: 10px;
      border-top: 1.5px solid #999;
      transform: rotate(-40deg);
      transform-origin: center;
    }
    .icon-color-clear {
      width: 18px;
      height: 18px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      color: #555;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }
    .icon-color-clear:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .color-popover {
      position: fixed;
      z-index: 9999;
      width: 196px;
      background: #fff;
      border: 1px solid #c9c9c9;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      padding: 10px;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .color-cell {
      width: 18px;
      height: 18px;
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 0;
      cursor: pointer;
      background: transparent;
    }
    .color-custom-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .color-custom-row input {
      flex: 1;
      min-width: 0;
      border: 1px solid #c7c7c7;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
      font-family: Consolas, monospace;
    }
    .color-custom-row button {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #bcbcbc;
      background: #f4f4f4;
      color: #222;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    .color-custom-row button:hover {
      background: #eaeaea;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .right-actions {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: white;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button.secondary {
      background: #e1e1e1;
      color: #222;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #refreshBtn svg {
      width: 16px;
      height: 16px;
    }
    #refreshBtn:active svg {
      animation: spin 0.6s linear;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #status {
      color: #0078d4;
      font-size: 13px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1 id="pageTitle"></h1>
  <div style="margin-top: 16px;">
    <label style="display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="hotkeysEnabled">
      <span id="hotkeysLabel"></span>
    </label>
    <div id="hotkeyStatus" style="color: #d13438; font-size: 12px; margin-top: 4px;"></div>
  </div>

  <div style="margin-bottom: 16px;">
    <label style="display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="startupEnabled">
      <span id="startupLabel"></span>
    </label>
  </div>

  <div class="description" id="description"></div>

  <div class="table-container">
    <div class="table-header">
      <div id="visibleHeader" style="text-align: center;"></div>
      <div id="displayNameHeader"></div>
      <div id="hotkeyHeader"></div>
      <div id="shortcutHeader" style="text-align: center;"></div>
      <div id="iconColorHeader"></div>
    </div>
    <div class="table-body" id="deviceList"></div>
  </div>

  <div class="footer">
    <div>
      <button id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"></path>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64M3.51 15A9 9 0 0 0 18.36 18.36"></path>
        </svg>
        <span id="refreshBtnText"></span>
      </button>
    </div>
    <div class="right-actions">
      <button id="saveBtn"><span id="saveBtnText"></span></button>
      <button id="closeBtn" class="secondary"><span id="closeBtnText"></span></button>
    </div>
  </div>
  <div id="status"></div>
  <div id="colorPopoverRoot"></div>

  <script src="./color-popover.js"></script>
  <script>
    let devices = [];
    const HOTKEY_NONE_VALUE = '__none__';
    let colorPopover = null;
    let texts = {
      title: '設定',
      description: 'コンテキストメニューに表示するデバイスを設定します。',
      hotkeysLabel: 'Ctrl+Alt+上下キーでデバイスを選択',
      startupLabel: 'スタートアップに登録',
      visibleHeader: '表示',
      displayNameHeader: '表示名',
      hotkeyHeader: 'ホットキー',
      shortcutHeader: 'ショートカット',
      shortcutDragLabel: 'D&D',
      shortcutDragTitle: 'Windowsへドラッグしてショートカットを作成',
      iconColorHeader: '色',
      selectColor: '色を選択',
      clearColor: '未設定に戻す',
      colorApply: 'OK',
      unknownDevice: '不明なデバイス',
      unavailableSuffix: '未接続',
      refresh: '更新',
      saveAndClose: '保存して閉じる',
      close: '閉じる',
      noneHotkey: 'なし',
      noDevices: 'デバイスが見つかりません。',
      saved: '設定を保存しました。',
      refreshed: 'デバイス一覧を更新しました。',
      saveErrorPrefix: '保存エラー',
      loadErrorPrefix: '読み込みエラー',
    };

    function t(key) {
      return texts[key] || key;
    }

    function applyLocaleTexts() {
      document.getElementById('pageTitle').textContent = t('title');
      document.title = t('title');
      document.getElementById('description').textContent = t('description');
      document.getElementById('hotkeysLabel').textContent = t('hotkeysLabel');
      document.getElementById('startupLabel').textContent = t('startupLabel');
      document.getElementById('visibleHeader').textContent = t('visibleHeader');
      document.getElementById('displayNameHeader').textContent = t('displayNameHeader');
      document.getElementById('hotkeyHeader').textContent = t('hotkeyHeader');
      document.getElementById('shortcutHeader').textContent = t('shortcutHeader');
      document.getElementById('iconColorHeader').textContent = t('iconColorHeader');
      document.getElementById('refreshBtnText').textContent = t('refresh');
      document.getElementById('saveBtnText').textContent = t('saveAndClose');
      document.getElementById('closeBtnText').textContent = t('close');
    }

    function normalizeColor(value) {
      const color = String(value || '').trim();
      return /^#[0-9A-Fa-f]{6}$/.test(color) ? color : '';
    }

    function createSwatchStyle(color) {
      if (!color) {
        return '';
      }
      return ` style="background:${color};"`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderDeviceList() {
      const container = document.getElementById('deviceList');
      if (!devices.length) {
        container.innerHTML = `<div style="padding: 16px; text-align: center; color: #999;">${t('noDevices')}</div>`;
        return;
      }

      container.innerHTML = devices.map(device => {
        const title = escapeHtml(device.name || `(${t('unknownDevice')})`);
        const aliasValue = escapeHtml(device.alias || '');
        const hotkeyValue = device.hotkey || HOTKEY_NONE_VALUE;
        const iconColorValue = normalizeColor(device.iconColor);
        const missingClass = device.available ? '' : ' missing';
        const displayName = device.available ? title : `${title} (${escapeHtml(t('unavailableSuffix'))})`;

        const hotkeyOptions = [
          { value: HOTKEY_NONE_VALUE, label: t('noneHotkey') },
          { value: 'Ctrl+Alt+Home', label: 'Ctrl+Alt+Home' },
          { value: 'Ctrl+Alt+End', label: 'Ctrl+Alt+End' },
          { value: 'Ctrl+Alt+PageUp', label: 'Ctrl+Alt+PageUp' },
          { value: 'Ctrl+Alt+PageDown', label: 'Ctrl+Alt+PageDown' },
          { value: 'Shift+Alt+Home', label: 'Shift+Alt+Home' },
          { value: 'Shift+Alt+End', label: 'Shift+Alt+End' },
          { value: 'Shift+Alt+PageUp', label: 'Shift+Alt+PageUp' },
          { value: 'Shift+Alt+PageDown', label: 'Shift+Alt+PageDown' }
        ];

        const hotkeySelect = `<select class="hotkey-select" data-device-id="${device.id}">
          ${hotkeyOptions.map(option => `<option value="${option.value}" ${option.value === hotkeyValue ? 'selected' : ''}>${option.label}</option>`).join('')}
        </select>`;
        const dragDisplayName = escapeHtml((device.alias || device.name || t('unknownDevice')).trim());

        const colorUi = `
          <div class="icon-color-col">
            <button type="button" class="icon-color-swatch${iconColorValue ? '' : ' is-empty'}" data-icon-color="${iconColorValue}" title="${escapeHtml(t('selectColor'))}"${createSwatchStyle(iconColorValue)}></button>
            <button type="button" class="icon-color-clear" title="${escapeHtml(t('clearColor'))}" ${iconColorValue ? '' : 'disabled'}>x</button>
          </div>`;

        return `
          <div class="table-row${missingClass}" data-device-id="${device.id}">
            <div class="device-name-row">
              <div class="device-name${!device.available ? ' unavailable' : ''}">${displayName}</div>
            </div>
            <div class="device-fields-row">
              <div class="checkbox-col">
                <input type="checkbox" class="hide-checkbox" ${!device.hidden ? 'checked' : ''}>
              </div>
              <div class="alias-col">
                <input type="text" class="alias-input" value="${aliasValue}" placeholder="${title}">
              </div>
              <div class="hotkey-col">
                ${hotkeySelect}
              </div>
              <div class="shortcut-col">
                <div class="shortcut-drag" draggable="true" title="${escapeHtml(t('shortcutDragTitle'))}" data-shortcut-name="${dragDisplayName}">${escapeHtml(t('shortcutDragLabel'))}</div>
              </div>
              <div>
                ${colorUi}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateIconColorUi(columnEl, color) {
      const normalized = normalizeColor(color);
      const swatch = columnEl.querySelector('.icon-color-swatch');
      const clearBtn = columnEl.querySelector('.icon-color-clear');

      swatch.dataset.iconColor = normalized;
      swatch.style.background = normalized || '#fff';
      swatch.classList.toggle('is-empty', !normalized);
      clearBtn.disabled = !normalized;
    }

    function handleHotkeyChange(changedSelect) {
      const selectedValue = changedSelect.value;
      if (selectedValue === HOTKEY_NONE_VALUE) return;

      const allSelects = document.querySelectorAll('.hotkey-select');
      allSelects.forEach(select => {
        if (select !== changedSelect && select.value === selectedValue) {
          select.value = HOTKEY_NONE_VALUE;
        }
      });
    }

    document.addEventListener('change', (event) => {
      if (event.target.classList.contains('hotkey-select')) {
        handleHotkeyChange(event.target);
        return;
      }

      if (event.target.classList.contains('alias-input')) {
        const row = event.target.closest('.table-row');
        const shortcutEl = row ? row.querySelector('.shortcut-drag') : null;
        if (shortcutEl) {
          const rawName = event.target.value.trim() || event.target.placeholder || t('unknownDevice');
          shortcutEl.dataset.shortcutName = rawName.trim();
        }
      }
    });

    document.addEventListener('dragstart', (event) => {
      const dragHandle = event.target.closest('.shortcut-drag');
      if (!dragHandle) {
        return;
      }

      const row = dragHandle.closest('.table-row');
      if (!row) {
        return;
      }

      const aliasInput = row.querySelector('.alias-input');
      const deviceName = row.querySelector('.device-name');
      const displayName = (aliasInput && aliasInput.value.trim()) || (aliasInput && aliasInput.placeholder) || dragHandle.dataset.shortcutName || (deviceName ? deviceName.textContent.replace(/\s+\(.+?\)\s*$/, '').trim() : t('unknownDevice'));

      // Electron's native file drag flow expects the renderer drag event
      // to be cancelled before the main process starts the OS-level drag.
      event.preventDefault();
      window.settingsAPI.startShortcutDrag({
        deviceId: row.dataset.deviceId,
        displayName,
      });
    });

    document.addEventListener('click', (event) => {
      if (event.target.classList.contains('icon-color-swatch')) {
        event.preventDefault();
        event.stopPropagation();
        const columnEl = event.target.closest('.icon-color-col');
        const swatch = columnEl.querySelector('.icon-color-swatch');
        const currentColor = normalizeColor(swatch ? swatch.dataset.iconColor : '');
        colorPopover.open({
          anchorEvent: event,
          currentColor,
          onSelect: color => updateIconColorUi(columnEl, color),
        });
        return;
      }

      if (event.target.classList.contains('icon-color-clear')) {
        event.preventDefault();
        event.stopPropagation();
        colorPopover.close();
        const columnEl = event.target.closest('.icon-color-col');
        updateIconColorUi(columnEl, '');
      }
    });

    async function loadSettings() {
      const result = await window.settingsAPI.getSettings();
      if (result.texts && typeof result.texts === 'object') {
        texts = { ...texts, ...result.texts };
      }
      applyLocaleTexts();
      devices = result.devices || [];
      document.getElementById('hotkeysEnabled').checked = result.hotkeysEnabled || false;
      document.getElementById('startupEnabled').checked = result.startupEnabled || false;
      renderDeviceList();
      document.getElementById('status').textContent = '';
      document.getElementById('hotkeyStatus').textContent = '';
    }

    async function saveSettings() {
      try {
        const rows = Array.from(document.querySelectorAll('.table-row'));
        const deviceUpdates = rows.map(row => {
          const id = row.dataset.deviceId;
          const visible = row.querySelector('.hide-checkbox').checked;
          const alias = row.querySelector('.alias-input').value.trim();
          const hotkey = row.querySelector('.hotkey-select').value;
          const swatch = row.querySelector('.icon-color-swatch');
          const iconColor = normalizeColor(swatch ? swatch.dataset.iconColor : '');
          return { id, hidden: !visible, alias, hotkey, iconColor };
        });
        const payload = {
          deviceUpdates,
          hotkeysEnabled: document.getElementById('hotkeysEnabled').checked,
          startupEnabled: document.getElementById('startupEnabled').checked,
        };

        await window.settingsAPI.updateSettings(payload);
        document.getElementById('status').textContent = t('saved');
      } catch (err) {
        document.getElementById('status').textContent = `${t('saveErrorPrefix')}: ${err && err.message ? err.message : String(err)}`;
      }
    }

    async function refreshDevices() {
      const result = await window.settingsAPI.refreshSettings();
      devices = result.devices || [];
      renderDeviceList();
      document.getElementById('status').textContent = t('refreshed');
    }

    window.settingsAPI.onRefreshRequest(() => {
      refreshDevices();
    });

    window.settingsAPI.onHotkeyConflict((_event, message) => {
      document.getElementById('hotkeyStatus').textContent = message;
    });

    document.getElementById('refreshBtn').addEventListener('click', () => refreshDevices());
    document.getElementById('saveBtn').addEventListener('click', async () => {
      await saveSettings();
      window.close();
    });
    document.getElementById('closeBtn').addEventListener('click', () => window.close());

    (async () => {
      try {
        colorPopover = new window.ColorPopover({
          root: document.getElementById('colorPopoverRoot'),
          getText: t,
          normalizeColor,
        });
        await loadSettings();
      } catch (err) {
        document.getElementById('status').textContent = `${t('loadErrorPrefix')}: ${err && err.message ? err.message : String(err)}`;
      }
    })();
  </script>
</body>
</html>
