<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>設定</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .description {
      margin: 0 0 16px;
      color: #555;
      font-size: 13px;
      line-height: 1.4;
    }
    .table-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid #d1d1d1;
      border-radius: 8px;
      background: #fff;
      margin-bottom: 12px;
      overflow: hidden;
    }

    /* ヘッダは4列 */
    .table-header {
      display: grid;
      grid-template-columns: 60px minmax(180px, 1fr) 140px 64px;
      gap: 12px;
      padding: 12px 16px;
      background: #f0f0f0;
      border-bottom: 1px solid #d1d1d1;
      font-weight: 600;
      font-size: 13px;
      align-items: center;
    }

    .table-body {
      flex: 1;
      overflow-y: auto;
    }

    /* 各デバイスは2段構成 */
    .table-row {
      padding: 10px 16px 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .table-row:last-child {
      border-bottom: none;
    }
    .table-row.missing {
      background: #fafafa;
      opacity: 0.75;
    }

    /* 上段: デバイス名 */
    .device-name-row {
      margin-bottom: 8px;
    }
    .device-name {
      word-break: break-word;
      font-size: 14px;
      font-weight: 600;
    }
    .device-name.unavailable {
      color: #999;
      font-size: 14px;
      font-weight: 400;
    }

    /* 下段: ヘッダと同じ4列 */
    .device-fields-row {
      display: grid;
      grid-template-columns: 60px minmax(180px, 1fr) 140px 64px;
      gap: 12px;
      align-items: center;
    }

    .checkbox-col {
      display: flex;
      justify-content: center;
    }
    .checkbox-col input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .alias-col {
      display: flex;
    }
    .alias-col input[type="text"] {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .hotkey-col {
      display: flex;
    }
    .hotkey-col select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .device-icon-col {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .device-icon-button {
      width: 28px;
      height: 28px;
      border: 1px solid #b7bfd1;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      padding: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .device-icon-button:hover {
      border-color: #7f95b8;
      background: #f7faff;
    }
    .device-icon-button img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      pointer-events: none;
    }
    .icon-popover {
      position: fixed;
      z-index: 9999;
      width: 196px;
      background: #fff;
      border: 1px solid #c9c9c9;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.16);
      padding: 10px;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .icon-cell {
      width: 30px;
      height: 30px;
      border: 1px solid #c3c9d7;
      border-radius: 6px;
      background: #fff;
      padding: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-cell:hover {
      border-color: #7f95b8;
      background: #f7faff;
    }
    .icon-cell.is-selected {
      border-color: #4f94db;
      box-shadow: 0 0 0 2px rgba(79, 148, 219, 0.18);
    }
    .icon-cell img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      pointer-events: none;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .right-actions {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #0078d4;
      color: white;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    button.secondary {
      background: #e1e1e1;
      color: #222;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #refreshBtn svg {
      width: 16px;
      height: 16px;
    }
    #refreshBtn:active svg {
      animation: spin 0.6s linear;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #status {
      color: #0078d4;
      font-size: 13px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1 id="pageTitle"></h1>
  <div style="margin-top: 16px;">
    <label style="display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="hotkeysEnabled">
      <span id="hotkeysLabel"></span>
    </label>
    <div id="hotkeyStatus" style="color: #d13438; font-size: 12px; margin-top: 4px;"></div>
  </div>

  <div style="margin-bottom: 16px;">
    <label style="display: flex; align-items: center; gap: 8px;">
      <input type="checkbox" id="startupEnabled">
      <span id="startupLabel"></span>
    </label>
  </div>

  <div class="description" id="description"></div>

  <div class="table-container">
    <div class="table-header">
      <div id="visibleHeader" style="text-align: center;"></div>
      <div id="displayNameHeader"></div>
      <div id="hotkeyHeader"></div>
      <div id="iconHeader"></div>
    </div>
    <div class="table-body" id="deviceList"></div>
  </div>

  <div class="footer">
    <div>
      <button id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"></path>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64M3.51 15A9 9 0 0 0 18.36 18.36"></path>
        </svg>
        <span id="refreshBtnText"></span>
      </button>
    </div>
    <div class="right-actions">
      <button id="saveBtn"><span id="saveBtnText"></span></button>
      <button id="closeBtn" class="secondary"><span id="closeBtnText"></span></button>
    </div>
  </div>
  <div id="status"></div>
  <div id="iconPopoverRoot"></div>

  <script src="./icon-popover.js"></script>
  <script>
    let devices = [];
    let iconChoices = [];
    const HOTKEY_NONE_VALUE = '__none__';
    let iconPopover = null;
    let texts = {
      title: '設定',
      description: 'コンテキストメニューに表示するデバイスを設定します。',
      hotkeysLabel: 'Ctrl+Alt+上下キーでデバイスを選択',
      startupLabel: 'スタートアップに登録',
      visibleHeader: '表示',
      displayNameHeader: '表示名',
      hotkeyHeader: 'ホットキー',
      iconHeader: 'アイコン',
      selectIcon: 'アイコンを選択 (ドラッグしてショートカット作成)',
      unknownDevice: '不明なデバイス',
      unavailableSuffix: '未接続',
      refresh: '更新',
      saveAndClose: '保存して閉じる',
      close: '閉じる',
      noneHotkey: 'なし',
      noDevices: 'デバイスが見つかりません。',
      saved: '設定を保存しました。',
      refreshed: 'デバイス一覧を更新しました。',
      saveErrorPrefix: '保存エラー',
      loadErrorPrefix: '読み込みエラー',
    };

    function t(key) {
      return texts[key] || key;
    }

    function applyLocaleTexts() {
      document.getElementById('pageTitle').textContent = t('title');
      document.title = t('title');
      document.getElementById('description').textContent = t('description');
      document.getElementById('hotkeysLabel').textContent = t('hotkeysLabel');
      document.getElementById('startupLabel').textContent = t('startupLabel');
      document.getElementById('visibleHeader').textContent = t('visibleHeader');
      document.getElementById('displayNameHeader').textContent = t('displayNameHeader');
      document.getElementById('hotkeyHeader').textContent = t('hotkeyHeader');
      document.getElementById('iconHeader').textContent = t('iconHeader');
      document.getElementById('refreshBtnText').textContent = t('refresh');
      document.getElementById('saveBtnText').textContent = t('saveAndClose');
      document.getElementById('closeBtnText').textContent = t('close');
    }

    function normalizeIconName(value) {
      const iconName = String(value || '').trim();
      if (!iconChoices.length) {
        return iconName || 'speaker_pink';
      }

      return iconChoices.some(choice => choice.id === iconName)
        ? iconName
        : iconChoices[0].id;
    }

    function getIconChoice(iconName) {
      const normalized = normalizeIconName(iconName);
      return iconChoices.find(choice => choice.id === normalized) || iconChoices[0] || null;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderDeviceList() {
      const container = document.getElementById('deviceList');
      if (!devices.length) {
        container.innerHTML = `<div style="padding: 16px; text-align: center; color: #999;">${t('noDevices')}</div>`;
        return;
      }

      container.innerHTML = devices.map(device => {
        const title = escapeHtml(device.name || `(${t('unknownDevice')})`);
        const aliasValue = escapeHtml(device.alias || '');
        const hotkeyValue = device.hotkey || HOTKEY_NONE_VALUE;
        const iconNameValue = normalizeIconName(device.iconName);
        const iconChoice = getIconChoice(iconNameValue);
        const missingClass = device.available ? '' : ' missing';
        const displayName = device.available ? title : `${title} (${escapeHtml(t('unavailableSuffix'))})`;

        const hotkeyOptions = [
          { value: HOTKEY_NONE_VALUE, label: t('noneHotkey') },
          { value: 'Ctrl+Alt+Home', label: 'Ctrl+Alt+Home' },
          { value: 'Ctrl+Alt+End', label: 'Ctrl+Alt+End' },
          { value: 'Ctrl+Alt+PageUp', label: 'Ctrl+Alt+PageUp' },
          { value: 'Ctrl+Alt+PageDown', label: 'Ctrl+Alt+PageDown' },
          { value: 'Shift+Alt+Home', label: 'Shift+Alt+Home' },
          { value: 'Shift+Alt+End', label: 'Shift+Alt+End' },
          { value: 'Shift+Alt+PageUp', label: 'Shift+Alt+PageUp' },
          { value: 'Shift+Alt+PageDown', label: 'Shift+Alt+PageDown' }
        ];

        const hotkeySelect = `<select class="hotkey-select" data-device-id="${device.id}">
          ${hotkeyOptions.map(option => `<option value="${option.value}" ${option.value === hotkeyValue ? 'selected' : ''}>${option.label}</option>`).join('')}
        </select>`;
        const iconUi = iconChoice ? `
          <div class="device-icon-col">
            <button type="button" class="device-icon-button" data-icon-name="${iconChoice.id}" title="${escapeHtml(t('selectIcon'))}" draggable="true">
              <img src="${iconChoice.iconUrl}" alt="${iconChoice.id}">
            </button>
          </div>
        ` : '';

        return `
          <div class="table-row${missingClass}" data-device-id="${device.id}">
            <div class="device-name-row">
              <div class="device-name${!device.available ? ' unavailable' : ''}">${displayName}</div>
            </div>
            <div class="device-fields-row">
              <div class="checkbox-col">
                <input type="checkbox" class="hide-checkbox" ${!device.hidden ? 'checked' : ''}>
              </div>
              <div class="alias-col">
                <input type="text" class="alias-input" value="${aliasValue}" placeholder="${title}">
              </div>
              <div class="hotkey-col">
                ${hotkeySelect}
              </div>
              <div>
                ${iconUi}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateIconUi(columnEl, iconName) {
      const button = columnEl.querySelector('.device-icon-button');
      const img = button ? button.querySelector('img') : null;
      const choice = getIconChoice(iconName);
      if (!button || !img || !choice) {
        return;
      }

      button.dataset.iconName = choice.id;
      img.src = choice.iconUrl;
      img.alt = choice.id;
    }

    function handleHotkeyChange(changedSelect) {
      const selectedValue = changedSelect.value;
      if (selectedValue === HOTKEY_NONE_VALUE) return;

      const allSelects = document.querySelectorAll('.hotkey-select');
      allSelects.forEach(select => {
        if (select !== changedSelect && select.value === selectedValue) {
          select.value = HOTKEY_NONE_VALUE;
        }
      });
    }

    document.addEventListener('change', (event) => {
      if (event.target.classList.contains('hotkey-select')) {
        handleHotkeyChange(event.target);
        return;
      }

      if (event.target.classList.contains('alias-input')) {
        return;
      }
    });

    document.addEventListener('dragstart', (event) => {
      const dragHandle = event.target.closest('.device-icon-button');
      if (!dragHandle) {
        return;
      }

      const row = dragHandle.closest('.table-row');
      if (!row) {
        return;
      }

      const aliasInput = row.querySelector('.alias-input');
      const deviceName = row.querySelector('.device-name');
      const displayName = (aliasInput && aliasInput.value.trim()) || (aliasInput && aliasInput.placeholder) || (deviceName ? deviceName.textContent.replace(/\s+\(.+?\)\s*$/, '').trim() : t('unknownDevice'));

      // Electron's native file drag flow expects the renderer drag event
      // to be cancelled before the main process starts the OS-level drag.
      event.preventDefault();
      window.settingsAPI.startShortcutDrag({
        deviceId: row.dataset.deviceId,
        displayName,
        iconName: normalizeIconName(dragHandle.dataset.iconName),
      });
    });

    document.addEventListener('click', (event) => {
      const iconButton = event.target.closest('.device-icon-button');
      if (iconButton) {
        event.preventDefault();
        event.stopPropagation();
        const columnEl = iconButton.closest('.device-icon-col');
        iconPopover.open({
          anchorEvent: event,
          iconChoices,
          currentIconName: iconButton.dataset.iconName,
          onSelect: iconName => updateIconUi(columnEl, iconName),
        });
        return;
      }
    });

    async function loadSettings() {
      const result = await window.settingsAPI.getSettings();
      if (result.texts && typeof result.texts === 'object') {
        texts = { ...texts, ...result.texts };
      }
      iconChoices = result.iconChoices || [];
      applyLocaleTexts();
      devices = result.devices || [];
      document.getElementById('hotkeysEnabled').checked = result.hotkeysEnabled || false;
      document.getElementById('startupEnabled').checked = result.startupEnabled || false;
      renderDeviceList();
      document.getElementById('status').textContent = '';
      document.getElementById('hotkeyStatus').textContent = '';
    }

    async function saveSettings() {
      try {
        const rows = Array.from(document.querySelectorAll('.table-row'));
        const deviceUpdates = rows.map(row => {
          const id = row.dataset.deviceId;
          const visible = row.querySelector('.hide-checkbox').checked;
          const alias = row.querySelector('.alias-input').value.trim();
          const hotkey = row.querySelector('.hotkey-select').value;
          const iconButton = row.querySelector('.device-icon-button');
          const iconName = normalizeIconName(iconButton ? iconButton.dataset.iconName : '');
          return { id, hidden: !visible, alias, hotkey, iconName };
        });
        const payload = {
          deviceUpdates,
          hotkeysEnabled: document.getElementById('hotkeysEnabled').checked,
          startupEnabled: document.getElementById('startupEnabled').checked,
        };

        await window.settingsAPI.updateSettings(payload);
        document.getElementById('status').textContent = t('saved');
      } catch (err) {
        document.getElementById('status').textContent = `${t('saveErrorPrefix')}: ${err && err.message ? err.message : String(err)}`;
      }
    }

    async function refreshDevices() {
      const result = await window.settingsAPI.refreshSettings();
      devices = result.devices || [];
      renderDeviceList();
      document.getElementById('status').textContent = t('refreshed');
    }

    window.settingsAPI.onRefreshRequest(() => {
      refreshDevices();
    });

    window.settingsAPI.onHotkeyConflict((_event, message) => {
      document.getElementById('hotkeyStatus').textContent = message;
    });

    document.getElementById('refreshBtn').addEventListener('click', () => refreshDevices());
    document.getElementById('saveBtn').addEventListener('click', async () => {
      await saveSettings();
      window.close();
    });
    document.getElementById('closeBtn').addEventListener('click', () => window.close());

    (async () => {
      try {
        iconPopover = new window.IconPopover({
          root: document.getElementById('iconPopoverRoot'),
          getText: t,
        });
        await loadSettings();
      } catch (err) {
        document.getElementById('status').textContent = `${t('loadErrorPrefix')}: ${err && err.message ? err.message : String(err)}`;
      }
    })();
  </script>
</body>
</html>
